name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: backend/global.json

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run tests
      run: >
        dotnet test --no-build --configuration Release --verbosity normal
        --logger "liquid.md;LogFileName=test-results.md"
        --results-directory TestResults

    - name: Publish test summary
      if: always()
      run: |
        if [ -f TestResults/test-results.md ]; then
          cat TestResults/test-results.md >> "$GITHUB_STEP_SUMMARY"
        else
          echo "No test report was generated." >> "$GITHUB_STEP_SUMMARY"
        fi

  frontend:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    defaults:
      run:
        working-directory: frontend/cinadex-ui

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: frontend/cinadex-ui/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Check formatting
      run: npm run format:check

    - name: Build
      run: npm run build

    - name: Run tests with coverage
      run: npm run coverage

    - name: Coverage summary
      if: always()
      uses: davelosert/vitest-coverage-report-action@v2
      with:
        working-directory: frontend/cinadex-ui
