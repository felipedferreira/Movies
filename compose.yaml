services:
  postgres:
    image: postgres:17-alpine
    container_name: movies-db
    environment:
      POSTGRES_USER: movies_rw
      POSTGRES_PASSWORD: P@ssw0rd!Secure#2024
      POSTGRES_DB: movies
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  movies.webservice:
    image: movies.webservice
    build:
      context: .
      dockerfile: src/Applications/Movies.WebService/Dockerfile
    container_name: movies-web
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Features__ApiDocumentationEnabled: "true"
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=movies;Username=movies_rw;Password=P@ssw0rd!Secure#2024"
      Kestrel__Endpoints__Http__Url: "http://0:0:0:0:8080"

volumes:
  postgres_data:

