services:
  postgres:
    image: postgres:17-alpine
    container_name: movies-db
    environment:
      POSTGRES_USER: movies_rw
      POSTGRES_PASSWORD: P@ssw0rd!Secure#2024
      POSTGRES_DB: movies
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  movies.webservice:
    image: movies.webservice
    build:
      context: ./backend
      dockerfile: src/Presentation/Movies.WebService/Dockerfile
    container_name: movies-web
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Features__ApiDocumentationEnabled: "true"
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=movies;Username=movies_rw;Password=P@ssw0rd!Secure#2024"
      Kestrel__Endpoints__Http__Url: "http://0:0:0:0:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/movies-svc/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  cinadex-ui:
    image: cinadex-ui
    build:
      context: ./frontend/cinadex-ui
    container_name: cinadex-ui
    ports:
      - "127.0.0.1:9000:80"
    depends_on:
      movies.webservice:
        condition: service_started

volumes:
  postgres_data:

